body:
  text: 形亦等一卷廿六甲亥與甲丙旣等各減相等之丙戌乙亥又減相等之乙寅戌午卽甲寅與甲午必等夫甲巽午甲巽寅兩形之甲寅甲午旣等甲巽同線甲午巽甲寅巽又等爲直角卽兩形必等而各邊各角俱等六卷七是甲震線必分丙甲亥角爲兩平分也一卷九甲乙丙一形內旣以丙兌線分甲丙乙角爲兩平分又以甲震線分丙甲乙角爲兩平分而相遇於坤則以坤爲心甲乙爲界作圜必切乙子子丑丑寅寅乙卯辰五邊而爲甲乙丙直角三邊形之內切圜卽乙丑直角方形之各邊爲容圓徑四卷四展轉論之則各大直角三邊形內之分角線皆分本角爲兩平分皆遇於坤而坤心圜爲各形之內切圜卽兩直角方形邊爲各句股形內之容圓徑又法曰甲乙股六百乙丙句三百二十并得九百二十與甲丙弦六百八十相減亦得乙子二百四十論曰如前論諸大句股形之分餘勾俱八十諸勾股和與諸弦相減之較亦俱八十則初分句二百四十爲諸形之容圓徑

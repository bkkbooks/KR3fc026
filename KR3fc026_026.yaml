body:
  text: 形亦等一卷草六甲亥與甲丙既等各減相等之丙戌乙亥又減相等之乙寅戌午即甲寅與甲午必等夫甲巽午甲巽寅兩形之甲寅甲午既等甲巽同線甲午巽甲寅巽又等為直角即兩形必等而各邊各角俱等六卷七是甲震線必分丙甲亥角為兩平分也一卷九甲乙丙一形內既以丙兌線分甲丙乙角為兩平分又以甲震線分丙甲乙角為兩平分而相遇於坤則以坤為心甲乙為界作圜必切乙子子丑丑寅寅乙卯辰五邊而為甲乙丙直角三邊形之內切圜即乙丑直角方形之各邊為容圓徑四卷四展轉論之則各大直角三邊形內之分角線皆分本角為兩平分皆遇於坤而坤心圜為各形之內切圜即兩直角方形邊為各句股形內之容圓徑又法曰甲乙股六百乙丙句三百二十并得九百二十與甲丙弦六百八十相減亦得乙子二百四十論曰如前論諸大句股形之分餘勾俱八十諸勾股和與諸弦相減之較亦俱八十則初分句二百四十為諸形之容圓徑

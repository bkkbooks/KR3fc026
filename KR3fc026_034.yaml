body:
  text: 論曰股冪為甲己直角方形以較而一為甲辛直角形即得甲壬邊與乙丙丙甲句弦和等何者甲丙弦冪之甲丑直角方形內當函一股冪一句冪一卷四七試於甲丑形內截取子卯丑辰邊各與甲丁較線等即卯丑辰丙俱與等乙丙句之丁丙線等而作甲卯卯辰辰丁三直角形其辰丁形之四邊皆與句等句冪也即甲卯卯辰兩形當與股冪等亦當與甲辛形等而甲庚卯寅皆較也甲子弦也卯丑句也則甲辛形之甲壬邊與句弦和等第十題股弦較求股求弦法曰乙丙句二十七甲乙股甲丙弦之較為丙丁九求股求弦以句自之得七百二十九較自之得八十一相減得六百四十八為實倍較為法除之得甲乙股三十六加較得甲丙弦四十五
  hash: sha256:70b52ac71e18c00e259d7e2cd8f6d67b51b7ff7a083071bafa3925f4ac28c13a

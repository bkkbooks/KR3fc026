body:
  text: 為直角戌離丙子離丙又俱小於直角即丙離戌丙離子兩三角形必等而兩形之各邊各角俱等六卷七則丙兌線必分甲丙未角為兩平分矣一卷九又子離與戌離兩邊既等本論子離震戌離卯兩交角又等一卷十五卯戌離震子離又等為直角即卯離戌離震子之各邊各角俱等而兩形亦等一卷草六又子離與離戌兩邊既等離卯與離震兩邊又等本論即子卯與戌震兩邊亦等子丑與戌酉各為相等之直角方形邊必等而各減相等之子卯戌震其所存卯丑震酉必等丑卯辰坎震酉兩角又各為離卯戌離震子相等角之交角必等辰丑卯震酉坎又等為直角即卯丑辰震酉坎之各邊各角俱等而兩形亦等一卷草六依顯午巽辰與坎艮乙之各邊各角俱等而兩形亦等巽寅兌與兌艮申之各邊各角俱等而兩形亦等又子丙

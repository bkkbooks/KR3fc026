body:
  text: 戌丙之數各八十乙子戌午各二百四十以諸率分數論之丑卯酉震各九十丑辰坎酉各四十八卯辰坎震各一百零二算見測圓海鏡之句股步率則減丑卯之卯子必一百五十也卯子股一百五十丙子句八十以求卯丙弦則一百七十也本篇一次減丙戌八十卽卯戌亦九十也丑辰卯卯戌離兩三角形之辰丑卯離戌卯旣等爲直角丑卯辰戌卯離兩交角又等丑卯與戌卯復等卽兩形必等而其各邊各角俱等一卷廿六依顯子離震與震酉坎兩形亦等依顯諸形之交角者皆相等其連角如酉亥坎乙亥坎兩形亦等而子離離戌皆四十八也則酉坎坎乙亦皆四十八也亥酉亥乙皆八十也子乙與戌酉等子丙與酉亥復等則乙丙與戌亥必等而甲爲同角甲乙丙甲戌亥又等爲直角則甲乙丙甲戌亥之各邊各角俱等而兩

body:
  text: 弦和和一百零八以股弦和減之得乙丙句二十七以句弦和減之得甲乙句三十六以句股和減之得甲丙弦四十五論曰兩和相乘為乙己直角形倍之為丁戊直角形以為實平方開之得己庚直角方形與丁戊等即其邊為弦和和者何也丁戊全形內有弦冪二股弦矩內形句弦矩內形句股矩內形各二與己庚全形內諸形比各等獨丁戊形內餘一弦冪己庚形內餘一句冪一股冪并二較一亦等一卷四七即己庚方形之各邊皆弦和和勾股義終番禹孟鴻光校

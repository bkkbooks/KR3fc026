body:
  text: 守敬受學於劉秉忠精算數水利巧思絶人世祖召見而陳水利六事又陳水利十有一事又嘗以海而較京師至汴梁定其地形高下之差又自孟門而東循黃河故道縱廣數百里間各為測量地平或可以分殺河勢或可以灌溉田土具有圖志如若思者可謂博大精深繼神禹之絶學者矣勝國略信用之若通惠會通諸役僅十之一二後其書復不傳實可惜也至乃遡其為法不過句股測量變而通之故在人耳又自古迄今無有言二法之所以然者自余從泰西子譯得測量法義不揣復作句股諸義即此法底裏洞然於以通變施用如伐材於林挹水於澤若思而在當為之撫掌一快已方今曆象之學或歲月可緩紛綸衆務或非世道所急至如西北治河東南治水利皆目前救時至計然而欲尋禹績恐此法終不可廢也有紹明郭氏之業者必能佐平成之功周公豈欺我哉句股遺言獨見於九章中凡數十法不出余所撰正法十五條元李冶廣之作測圓海鏡近顧司寇應祥為之分類釋術余欲為説其義未遑也其造端第一論則此篇之七亦略具矣周髀首章九章

body:
  text: 形即得丙庚邊與甲乙甲丙股弦和等何者甲丙弦冪之甲辛直角方形內當函一股冪一句冪一卷四七試於甲辛形內依丙丁較截作丁辛丁癸癸壬三直角形即癸壬形與股冪等而丁辛丁癸兩形并當與句冪等亦與丙己直角形等夫壬辛甲癸己庚皆較也而甲丁與股等丙辛與弦等即丙庚與股弦和等第十一題句股和求股求句法曰甲丙弦四十五甲乙乙丙句股和六十三求句求股以弦自之得二千零二十五句股和自之得三千九百六十九相減得一千九百四十四復與弦冪相減得八十一開方得句股較甲卯九加和得七十二半之得甲乙股三十六減較得乙丙句二十七論曰以句股和作甲丁一直線自之為甲己直角方形此形內函甲辛癸己兩股冪乙寅庚壬兩句冪而甲辛癸己之閒重一癸辛直角方形夫甲丙弦之冪既與句股兩冪并等一卷四七以減甲乙形內之甲辛乙

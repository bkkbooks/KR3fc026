body:
  text: 第五題餘句餘股求容方求句求股法曰甲丁餘股七百五十戊丙餘句三十求丁乙戊己容方邊以丙戊甲丁相乘得二萬二千五百爲實開方得容方乙丁丁己各邊俱一百五十加餘股得股九百加餘句得句一百八十論曰甲丁戊丙相乘爲實卽成己壬辛庚直角形與丁乙戊己爲甲丙角線形內之兩餘方形等一卷四三而壬己與己戊偕丁己與己庚爲互相視之邊六卷十四故己壬辛庚之實卽丁乙戊己之實開方得丁乙戊己直角方形邊又論曰甲丁與丁己旣若己戊與戊丙六卷四之系卽方形邊當爲甲丁戊丙之中率六卷卅三之十五增題今列甲丁

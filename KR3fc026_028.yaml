body:
  text: 第八題句股較求股求句法曰甲丙弦四十五甲乙股乙丙句之較為甲丁九求股求句以弦自之得二千零二十五倍得四千零五十較自之得八十一以減兩弦冪存三千九百六十九為實開方得句股和六十三加較九得七十二半之得三十六為甲乙股減較得二十七為乙丙句論曰弦冪為甲戊直角方形倍之為己丙直角形較冪為甲庚直角方形與甲辛等相減即得減甲辛形之己辛丙磬折形也今欲顯己辛丙磬折形開方而得句股和者試察甲丙上直角方形與甲乙乙丙上兩直角方形并等一卷四七即甲戊一弦冪內有一甲乙股冪一乙丙句冪也己丙兩弦冪內有兩甲乙冪兩乙丙冪也故以己丙為實開方即得丑辰直角方形其丑寅與卯辰兩形兩股冪也丙壬與癸子兩形兩句冪也而丑寅卯辰之間則重一等甲辛之卯寅形

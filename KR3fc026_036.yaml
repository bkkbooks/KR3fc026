body:
  text: 論曰句冪爲乙己直角方形較冪爲丙丑直角方形與丙庚等相減存乙庚己磬折形爲實次倍丙丁較線爲乙辛線以爲法除實卽得辛壬直角形與乙庚己磬折形等而乙壬邊與甲乙股等何者甲丙弦冪之甲癸直角方形內當函一句冪一股冪一卷四七試於甲癸形內截取丙丑較冪之外分作甲丑丑癸丑子三直角形卽丑子與股冪等而丙丑甲丑丑癸三形并當與句冪等次各減一相等之丙丑丙庚卽甲丑丑癸并與乙庚己磬折形等亦與辛壬直角形等辛乙與寅丑丑丁并等卽乙壬與甲丁或寅癸等亦與甲乙等又法曰句自之得七百二十九爲實以較爲法除之得股弦和八十一加較得九十半之得弦四十五減較得股三十六論曰句冪爲丙戊直角方形以較而一爲丙己直角

body:
  text: 得十六句自之得九并得二十五為實開方得甲丙弦五第二題句弦求股法曰如前圖乙丙句三自之得九甲丙弦五自之得二十五相減得較十六開方得甲乙股四第三題股弦求句法曰如前圖甲乙股四自之得十六甲丙弦五自之得二十五相減得較九開方得乙丙句三已上三論俱見一卷四十七題凡言某卷某題者皆引幾何原本為證下同第四題句股求容方法曰甲乙股三十六乙丙句二十七求容方以句股相乘為實并句股得甲戊六十三為法除之得容方辛乙乙癸各邊俱一十五四二八

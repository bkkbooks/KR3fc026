body:
  text: 句股之鼻祖甄鸞李淳風輩為之重釋頗明悉實為算術中古文第一余故為採托要語辨諸篇端以俟用世之君子不廢芻蕘者其圖注見他本為節解至於商高問答之後所謂榮方問於陳子者言日月天地之數則千古大愚也李淳風駁正之殊為未辨若周髀果盡此其學廢弗傳不足怪而亦有近理者數十語絶勝渾天家余嘗為雌黃之別有論

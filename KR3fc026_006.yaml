body:
  text: 句股之鼻祖甄鸞李淳風輩爲之重釋頗明悉實爲算術中古文第一余故爲採摭要語弁諸篇端以俟用世之君子不廢芻蕘者其圖註見他本爲節解至於商高問答之後所謂榮方問於陳子者言日月天地之數則千古大愚也李淳風駁正之殊爲未辨若周髀果盡此其學廢弗傳不足怪而亦有近理者數十語絕勝渾天家余嘗爲雌黃之別有論

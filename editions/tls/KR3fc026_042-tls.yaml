body:
  text: 子午辛磬折形卽股冪矣何者卯己弦冪內當函一句冪一股冪也一卷四七又庚未與未寅等卽庚壬形亦股冪也以庚壬形代磬折形卽丁辛丙己兩形爲和冪與股冪之減存形也半之卽丙己形以等句弦和之乙己除之得乙丙句又法曰股自之得一千二百九十六以句弦和七十二爲法除之得十八爲句弦較加句弦和得九十半之得四十五爲弦減較得二十七爲句此法與本篇第九題又法同論第十三題股弦和求股求弦法曰乙丙句二十七甲乙乙丙股弦和八十一求股求弦以句自之得七百二十九股弦和自之得六千五百六十一相減得五千八百三十二半之得二千九百零十六爲實以和爲法除之得甲乙
  hash: sha256:87beaa41330c22cdee5948fd3bfdee20f4aa03f177bc02bb3645883d6f3e6418

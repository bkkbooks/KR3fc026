body:
  text: 法曰甲乙股六百乙丙句三百二十求容圓以句股相乘得一萬九千二百倍之得三萬八千四百爲實別以句股求弦得甲丙弦六百八十本篇一并勾股弦爲法除實得容圓徑乙子二百四十論曰甲乙股乙丙勾相乘卽甲乙丙丁直角形倍之爲實卽丙丁戊己直角形求得甲丙弦并勾股得一千六百於甲乙線引長之截乙庚與句等庚辛與弦等得甲辛爲弦和和線以爲法除實得辛壬邊二百四十卽成甲辛壬癸直角形與丙丁戊己形等六卷十六而壬癸邊截乙丙句於子次從子作子丑寅乙直角方形卽此形之各邊皆爲容圓徑曷名爲容圓徑也謂於甲乙丙三邊直角形內作一圜其甲丙弦截子丑寅乙直角方形之卯辰線與乙子子丑丑寅寅乙諸邊皆爲切圜線也則何以顯此五邊之皆爲切圜線乎試於甲乙丙形上復作一丙午未

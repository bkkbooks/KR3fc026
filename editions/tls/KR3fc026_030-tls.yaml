body:
  text: 減之卽丑辰直角方形與己辛丙磬折形等矣乙丙爲句丙丑與甲乙等故乙丑邊卽句股和也若於乙丙句加甲丁較卽與甲乙股等故甲乙乙丙甲丁并半之爲甲乙股以甲丁較減甲乙股爲乙丙句第九題句弦較求句求弦法曰甲乙股三十六乙丙句甲丙弦之較爲甲丁十八求句求弦以股自之得一千二百九十六較自之得三百二十四相減存九百七十二爲實倍較爲法除之得二十七爲乙丙句加較得四十五爲甲丙弦論曰股冪爲甲戊直角方形較冪爲丁庚直角方形與辛癸等相減存甲壬戊磬折形爲實次倍甲丁較線爲乙寅線以爲法除實卽得乙子直角形與甲壬戊磬折形等何者乙子直角形加一等較冪之乙丑
  hash: sha256:80bd4d5e0e7020c6b55b71d3df5a84821011e2e02268b5fd18ffa4879714a8dc

body:
  text: 論曰股弦較甲丁二自之得四爲己庚直角方形句弦較乙戊九自之得八十一爲辛壬直角方形兩冪并得八十五以二減九得七卽句股較自之得四十九爲乾兌直角方形元設兩較互乘爲癸戊子丑兩直角形并得三十六以三十六減八十五亦得四十九何以知癸戊子丑三十六爲實開方得六之寅卯直角方形邊則弦和較也凡直角三邊形之弦冪必與句股兩冪并等一卷四七甲乙丙旣直角形則甲乙乙丙兩冪并必與甲丙冪等今於甲乙股加甲辰弦丙乙句加乙午弦甲丙弦加丙未句未申股各作一直線以此三和線作一三邊形一卷廿二卽甲申上之甲酉直角方形必不等於丙午上之丙戌直角方形乙辰上之乙亥直角方形

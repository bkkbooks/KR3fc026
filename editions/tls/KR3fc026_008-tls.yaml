body:
  text: 吳淞徐光啟撰句股卽三邊直角形也底線爲句底上之垂線爲股對直角邊爲弦句股上兩直角方形并與弦上直角方形等故句三股四則弦必五一卷四七注從此可以句股求弦句弦求股股弦求句一卷四七注可以求句股中容方容圓可以各較求句求股求弦可以各和求句求股求弦可以大小兩句股互相求可以立表求高深廣遠以通句股之窮可以二表四表求極高深極廣遠以通立表之窮其大小相求及立表諸法測量法義所論著略備矣句股自相求以至容方容圓各和各較相求者舊九章中亦有之第能言其法不能言其義也所立諸法蕪陋不堪讀門人孫初陽氏刪爲正法十五條稍簡明矣余因各爲論譔其義使夫精於數學者攬圖誦説庶或爲之解頤第一題句股求弦法曰甲乙股四乙丙句三求弦以股自之

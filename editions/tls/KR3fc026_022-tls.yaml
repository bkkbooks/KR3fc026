body:
  text: 爲直角戌離丙子離丙又俱小於直角卽丙離戌丙離子兩三角形必等而兩形之各邊各角俱等六卷七則丙兌線必分甲丙未角爲兩平分矣一卷九又子離與戌離兩邊旣等本論子離震戌離卯兩交角又等一卷十五卯戌離震子離又等爲直角卽卯離戌離震子之各邊各角俱等而兩形亦等一卷廿六又子離與離戌兩邊旣等離卯與離震兩邊又等本論卽子卯與戌震兩邊亦等子丑與戌酉各爲相等之直角方形邊必等而各減相等之子卯戌震其所存卯丑震酉必等丑卯辰坎震酉兩角又各爲離卯戌離震子相等角之交角必等辰丑卯震酉坎又等爲直角卽卯丑辰震酉坎之各邊各角俱等而兩形亦等一卷廿六依顯午巽辰與坎艮乙之各邊各角俱等而兩形亦等巽寅兌與兌艮申之各邊各角俱等而兩形亦等又子丙

body:
  text: 內形如甲己者四今以四弦冪當四句冪四股冪一卷四七則甲己辛坎兩形并必與寅巽形等甲丙與巽申等弦也丙申句股和也則兩弦閒等寅卯形邊之丙巽不得不爲弦和較矣旣得丙巽六爲弦和較卽以元設兩較相加可得句股弦各數也何者巽申弦也巽艮句弦較也艮申句也丙申句股和也於丙申句股和減艮申句則丙巽加巽艮之丙艮股也丙甲弦也丙坤股弦較也坤甲股也巽甲句股和也於巽甲句股和減坤甲股則巽丙加丙坤之巽坤句也次以巽艮加艮申或丙坤加坤甲則弦也第十五題句弦和股弦和求句求股求弦法曰甲丙乙丙句弦和七十二甲乙甲丙股弦和八十一求句求股求弦以兩和相乘得五千八百三十二倍之得一萬一千六百六十四爲實平方開之得

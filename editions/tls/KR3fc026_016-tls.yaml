body:
  text: 七百五十戊丙三十而求其中率之數其法以前率比後率爲二十五倍大之比例二十五開方得五則中率當爲五倍之比例甲丁七百五十反五倍得一百五十一百五十反五倍得丙戊三十則方形邊一百五十爲甲丁丙戊之中率六卷界說五第六題容方與餘句求餘股與餘股求餘句法曰容方乙丁丁己各邊俱一百五十戊丙餘句三十求甲丁餘股以容方邊自之爲實以餘句爲法除之得甲丁餘股七百五十以容方與餘股求餘句法同論曰如上論兩餘方形等實故以等己庚之丙戊除之得等壬己之甲丁又論曰方形邊旣爲甲丁戊丙之中率六卷三十三之十五增題卽方形邊自乘爲實以戊丙除之得甲丁以甲丁除之得戊丙六卷十七第七題勾股求容圓

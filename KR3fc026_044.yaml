body:
  text: 股三十六以減和得甲丙弦四十五論曰乙丁和冪內之戊己句冪也餘論同本篇十二題又法曰句自之得七百二十九以股弦和八十一為法除之得九為股弦較加股弦和得九十半之得四十五為弦減較得三十六為股此法與本篇第十題又法同論第十四題股弦較句弦較求句求股求弦法曰甲乙股甲丙弦較二乙丙句甲丙弦較九求句求股求弦以二較相乘得十八倍之得三十六為實平方開之得六為弦和較加句弦較九得甲乙股十五加股弦較二得乙丙句八以句弦較加句或股弦較加股得十七為甲丙弦

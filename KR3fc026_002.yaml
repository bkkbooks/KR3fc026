body:
  text: 周髀算經曰昔者周公問於商高曰竊聞乎大夫善數也請問古者庖犧立周天曆度夫天不可階而升地不可尺寸而度請問數從安出商高曰數之法出於圓方圓出於方方出於矩矩出於九九八十一故折矩以為句廣三股修四徑隅五既方之外半其一矩圜而共盤得成三四五兩矩共長二十有五是謂積矩故禹之所以治天下者此數之所生也漢趙君卿注曰禹治洪水決流江河望山川之形定高下之勢除滔天之災釋昏墊之厄使東注於海而無浸溺乃句股之所由生也又曰觀其迭相規矩共為反覆互與通分各有所得然則統敘羣倫弘紀衆理貫幽入微鉤深致遠故曰其裁制萬物惟所為之也徐光啓曰周髀句股者世傳黃帝所作而經言庖犧疑莫能明也然二帝皆用造曆而禹復藉之以平水土蓋度數之用無所不通者也後世治曆之家代不絶人亦且增修遞進至元郭守敬若思十得其六七矣亡不資算術為用者獨水學久廢即有專門名家代不一二人亦絶不聞以句股從事僅見元史載

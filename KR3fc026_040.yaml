body:
  text: 寅兩形即所存戊辛寅磬折形少於弦冪者為癸辛形矣乙辛股也乙丑句也則丑辛較也第十二題句弦和求句求弦法曰甲乙股三十六乙丙甲丙句弦和七十二求句求弦以股自之得一千二百九十六句弦和自之得五千一百八十四相減得三千八百八十八半之得一千九百四十四為實以和為法除之得乙丙句二十七以減和得甲丙弦四十五論曰以句弦和作乙丁一直線自之為乙戊直角方形次用句弦度相減取丙庚兩點從丙從庚作庚辛丙壬二平行線依此法作癸子丑寅二平行線即乙戊一形中截成丙子丑辛丁卯午己句冪四庚未辰壬癸辰未寅較句矩內直角形四卯午較冪一也今欲於乙戊全形中減一甲乙股之冪則於卯己弦冪內一一較并句為弦存午己句冪而減

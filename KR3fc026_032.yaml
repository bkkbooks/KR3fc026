body:
  text: 直角方形成子卯癸磬折形即與股冪之甲戊直角方形等也又何者甲丙弦冪之甲辰直角方形內當函一句冪一股冪一卷四七試於甲辰形內截取丁庚較冪之外分作庚未未午午丁三直角形其甲庚申未酉戌三線各與甲丁較線等庚申未戌未辰午酉四線各與等乙丙句之丁丙線等夫未酉酉戌并與句等即申未未酉并亦與句等而庚申未辰各與句等即庚未未午兩形并為句冪而丁庚午丁兩形并為股冪矣丁戌戌酉兩較也乙卯卯寅亦兩較也而丁丙與乙丙元等即丁午乙子兩形等丁庚與乙丑兩形又等即丁庚午丁并與子卯癸磬折形等而子卯癸磬折形與股冪之甲戊形等此兩率者各減一等較冪之辛癸乙丑形即乙子直角形與甲壬戊磬折形等又法曰股自之得一千二百九十六為實以句弦較十八為法除之得句弦和七十二加較得九十半之得弦四十五減較得句二十七

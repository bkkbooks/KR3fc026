body:
  text: 直角三邊形交加其上其午丙與乙丙等未午與甲乙等未丙與甲丙等卽兩形必等一卷廿二可推次依丙午未直角作午申酉戌直角方形與乙子丑寅直角方形等次於戌酉線引之至亥又成甲戌亥直角三邊形以甲爲同角交加於甲乙丙形之上亦以午申酉戌爲容圓徑次於亥戌寅丑兩線引之遇於乾又成乾寅亥直角三邊形以亥爲同角交加於甲乙丙形之上亦以乙子丑寅爲容圓徑次作丙兌線遇諸形之交加線於離於兌次作甲震線遇諸形之交加線於巽於震次作亥辰線遇諸形之交加線於坎於辰次作未乾線遇諸形之交加線於艮於卯而四線俱相遇於坤夫午丙與乙丙兩線等而減相等之午戌乙子卽戌丙與子丙必等丙離同線丙戌離丙子離又等

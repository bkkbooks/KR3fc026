body:
  text: 子午辛磬折形即股冪矣何者卯己弦冪內當函一句冪一股冪也一卷四七又庚未與未寅等即庚壬形亦股冪也以庚壬形代磬折形即丁辛丙己兩形為和冪與股冪之減存形也半之即丙己形以等句弦和之乙己除之得乙丙句又法曰股自之得一千二百九十六以句弦和七十二為法除之得十八為句弦較加句弦和得九十半之得四十五為弦減較得二十七為句此法與本篇第九題又法同論第十三題股弦和求股求弦法曰乙丙句二十七甲乙乙丙股弦和八十一求股求弦以句自之得七百二十九股弦和自之得六千五百六十一相減得五千八百三十二半之得二千九百零十六為實以和為法除之得甲乙
  hash: sha256:26d74e6297f3585f34e9aa2bfd891c76c191ac4e79b3d872362a79a5a4cb8809

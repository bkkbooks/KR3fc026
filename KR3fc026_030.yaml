body:
  text: 減之即丑辰直角方形與己辛丙磬折形等矣乙丙為句丙丑與甲乙等故乙丑邊即句股和也若於乙丙句加甲丁較即與甲乙股等故甲乙乙丙甲丁并半之為甲乙股以甲丁較減甲乙股為乙丙句第九題句弦較求句求弦法曰甲乙股三十六乙丙句甲丙弦之較為甲丁十八求句求弦以股自之得一千二百九十六較自之得三百二十四相減存九百七十二為實倍較為法除之得二十七為乙丙句加較得四十五為甲丙弦論曰股冪為甲戊直角方形較冪為丁庚直角方形與辛癸等相減存甲壬戊磬折形為實次倍甲丁較線為乙寅線以為法除實即得乙子直角形與甲壬戊磬折形等何者乙子直角形加一等較冪之乙丑

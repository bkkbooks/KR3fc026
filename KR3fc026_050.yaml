body:
  text: 弦冪之上即得句股之較冪丙己而乙丙上重一句冪次以所重之句冪補其等句冪之丁己戊磬折形則甲乙弦冪之大於乙庚辛壬兩句股矩內形必丙己句股較冪矣故知向者乙亥或丙戌內與甲酉內兩存形之較必句股較冪之四十九也則乙亥丙戌兩形并其大於申酉形亦句股較冪之四十九也今於辛壬較冪內減句股較冪四十九之乾兌直角方形其所存乾離震兌兩餘方形及離震己庚兩直角方形并必與癸戌子丑兩形并等次以癸戌子丑兩形開方為寅卯形則減寅卯之甲酉形與減辛壬之丙戌形減己庚之乙亥形并必等而減寅卯之甲酉形內元有弦冪如甲寅者四有弦偕寅卯形邊矩內形如寅巽者四減辛壬之丙戌形內元有句冪如丙辛者四有句偕句弦較矩內形如辛坎者四減己庚之乙亥形內元有句冪如己辰者四有股偕股弦較矩

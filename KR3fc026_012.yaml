body:
  text: 論曰甲乙三十六乙丙二十七相乘得九百七十二以為實即成甲乙丙丁直角形次以甲乙乙丙并得六十三為法即成甲戊線除實得戊己邊十五四二八即成甲戊己庚直角形與甲乙丙丁形等六卷十六而己庚邊截乙丙句於癸甲丙弦於壬即成乙辛壬癸滿句股之直角方形何者甲乙丙丁與甲戊己庚兩形互相視即甲乙與甲戊若乙癸與乙丙六卷十五分之即甲乙與乙戊若乙癸與癸丙是甲乙與乙丙亦若乙癸與癸丙也乙丙乙戊元等又甲辛與辛壬若壬癸與癸丙六卷四更之即甲辛與壬癸若辛壬與癸丙也而辛乙與壬癸等乙癸與辛壬等則甲辛與辛乙若乙癸與癸丙矣夫甲乙與乙丙既若乙癸與癸丙而甲辛與辛乙又若乙癸與癸丙則甲乙與乙丙亦若甲辛與辛乙而乙辛壬癸為滿句股之直角方形六卷十五增題又簡論曰如前圖以甲乙戊為法而除甲丙實既得甲庚戊己各與方形邊等今以等甲乙戊之丙乙戊為法而除甲丙實得庚丙戊己亦各與方形邊等則辛乙癸壬為直角方形

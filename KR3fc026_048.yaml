body:
  text: 并而此不相等之較必句股較冪之四十九也何者若於甲酉丙戌乙亥三直角方形各以元設句股弦分之即甲酉形內有弦幂一股冪一句冪一股弦矩內形二句弦矩內形二句股矩內形二而乙亥形內有弦冪一股冪一股弦矩內形二丙戌形內有弦冪一句冪一句弦矩內形二次以甲西內諸形輿乙亥丙戌內諸形相當相抵則甲酉內存句股矩內形二丙戌或乙亥內存弦冪一次以此兩存形相當相抵則一弦冪之大於兩句股矩內形必句股較冪之四十九也何者一弦冪內函一句冪一股冪今試如上同任作一甲乙弦冪其乙丙為句冪則丁丙戊馨折形必典股冪等乙己為股冪則丁己戊磬折形必與句冪等次以乙庚辛壬兩句股矩內形輳乙角依角旁兩邊縱橫交加於
